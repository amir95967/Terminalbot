<div style="padding: 20px; font-family: sans-serif;">
    <h1>Terminal X Bot Control</h1>
    
    <button id="runBotBtn" style="padding: 15px 30px; background: yellow; cursor: pointer; border: 2px solid black;">
        🚀 צור משתמש חדש (יפתח דפדפן במחשב)
    </button>

    <h2 style="margin-top: 30px;">חשבונות שנוצרו בסופהבייס:</h2>
    <table border="1" id="couponsTable" style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee;">
                <th>מייל</th>
                <th>סיסמה</th>
                <th>קישור לתיבה</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://vcbcftlykgpvgwqwyzzf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // שים פה את ה-Anon Key שלך
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // פונקציה למשיכת הנתונים מהטבלה
    async function loadCoupons() {
        const { data } = await supabase.from('coupons').select('*').order('created_at', { ascending: false });
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (data) {
            data.forEach(c => {
                tbody.innerHTML += `<tr>
                    <td>${c.terminal_email}</td>
                    <td>${c.terminal_password}</td>
                    <td><a href="${c.inbox_url}" target="_blank">פתח מייל</a></td>
                </tr>`;
            });
        }
    }

    // הפעלת הבוט דרך השרת המקומי (localhost)
    document.getElementById('runBotBtn').onclick = async () => {
        alert("שולח פקודה למחשב... וודא ש-node app.js רץ!");
        try {
            const res = await fetch('http://localhost:3001/run-bot', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                alert("הרישום הסתיים בהצלחה!");
                loadCoupons();
            }
        } catch (e) {
            alert("שגיאה: וודא שהבוט פועל אצלך במחשב על פורט 3001");
        }
    };

    loadCoupons();
</script>
