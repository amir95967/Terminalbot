<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול בוט טרמינל X</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        tr:nth-child(even) { background-color: #f2 f2 f2; }
        button { padding: 15px 30px; background: #fe fa00; cursor: pointer; font-weight: bold; border: 2px solid black; }
    </style>
</head>
<body>
    <h1>מרכז שליטה: Terminal X Bot</h1>
    
    <button id="runBotBtn">🚀 צור משתמש חדש (יפתח דפדפן במחשב שלך)</button>

    <h2>חשבונות שנוצרו:</h2>
    <table>
        <thead>
            <tr>
                <th>מייל</th>
                <th>סיסמה</th>
                <th>תיבת הודעות</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vcbcftlykgpvgwqwyzzf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // שים פה את ה-Anon Key המלא שלך
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            const { data } = await supabase.from('coupons').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data ? data.map(c => `
                <tr>
                    <td>${c.terminal_email}</td>
                    <td>${c.terminal_password}</td>
                    <td><a href="${c.inbox_url}" target="_blank">פתח Maildrop</a></td>
                </tr>
            `).join('') : '';
        }

        document.getElementById('runBotBtn').onclick = async () => {
            try {
                const res = await fetch('http://localhost:3001/run-bot', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert("הבוט סיים! מרענן נתונים...");
                    loadData();
                }
            } catch (e) {
                alert("שגיאה: וודא ש-node app.js רץ אצלך במחשב על פורט 3001");
            }
        };

        loadData();
    </script>
</body>
</html>
